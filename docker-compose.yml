services:
  traefik-public:
    image: traefik:v3.6.9
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.dns.acme.caserver=${ACME_CASERVER}"
      - "--certificatesresolvers.dns.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.dns.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.dns.acme.dnschallenge=true"
      - "--certificatesresolvers.dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.dns.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    ports:
      - "443:443/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik_public_acme:/acme"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    restart: unless-stopped

  headscale:
    image: headscale/headscale:stable
    command: [ "serve" ]
    volumes:
      - "./headscale/config.yaml:/etc/headscale/config.yaml:ro"
      - "./headscale/acl.hujson:/etc/headscale/acl.hujson:ro"
      - "headscale_data:/var/lib/headscale"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headscale.rule=Host(`${HEADSCALE_DOMAIN}`)"
      - "traefik.http.routers.headscale.entrypoints=websecure"
      - "traefik.http.routers.headscale.tls=true"
      - "traefik.http.routers.headscale.tls.certresolver=dns"
      - "traefik.http.services.headscale.loadbalancer.server.port=8080"
    ports:
      - "3478:3478/udp"
    depends_on:
      - traefik-public
    restart: unless-stopped

  ts-infra:
    image: tailscale/tailscale:latest
    hostname: ts-infra
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ts_infra_state:/var/lib/tailscale
      - ./certs:/staging-certs:ro
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${INFRA_AUTHKEY}
      - TS_HOSTNAME=infra-vps
      - TS_ACCEPT_DNS=true
      - TS_AUTH_ONCE=true
      - TS_EXTRA_ARGS=--login-server=https://${HEADSCALE_DOMAIN} --accept-routes=true
      - SSL_CERT_DIR=${SSL_CERT_DIR}
      - TS_USERSPACE=false
      - TS_TAILSCALED_EXTRA_ARGS=--tun=tailscale0
    restart: unless-stopped

  traefik-lab:
    image: traefik:v3.6.9
    network_mode: "service:ts-infra"
    command:
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8888"
      - "--api=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--metrics.prometheus=true"
      - "--providers.consulcatalog=true"
      - "--providers.consulcatalog.endpoint.address=127.0.0.1:8500"
      - "--providers.consulcatalog.exposedbydefault=false"
      - "--providers.consulcatalog.prefix=traefik"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--certificatesresolvers.dns.acme.caserver=${ACME_CASERVER}"
      - "--certificatesresolvers.dns.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.dns.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.dns.acme.dnschallenge=true"
      - "--certificatesresolvers.dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.dns.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    volumes:
      - "traefik_lab_acme:/acme"
      - "./tailnet/traefik/dynamic:/etc/traefik/dynamic:ro"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    depends_on:
      - ts-infra
      - consul
    restart: unless-stopped

  coredns:
    image: coredns/coredns:1.11.1
    network_mode: "service:ts-infra"
    command: [ "-conf", "/etc/coredns/Corefile" ]
    volumes:
      - "./tailnet/coredns/Corefile:/etc/coredns/Corefile:ro"
      - "./tailnet/coredns/db.lab.domain:/etc/coredns/db.lab.domain:ro"
    depends_on:
      - ts-infra
    restart: unless-stopped

  consul:
    image: hashicorp/consul:1.18
    network_mode: "service:ts-infra"
    command: [ "agent", "-server", "-bootstrap-expect=1", "-ui", "-config-dir=/consul/config" ]
    volumes:
      - "./tailnet/consul:/consul/config"
      - "consul_data:/consul/data"
    depends_on:
      - ts-infra
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    network_mode: "service:ts-infra"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    depends_on:
      - ts-infra
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    network_mode: "service:ts-infra"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://alertmanager.${LAB_DOMAIN}"
    volumes:
      - "./tailnet/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro"
      - "alertmanager_data:/alertmanager"
    depends_on:
      - ts-infra
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    network_mode: "service:ts-infra"
    command: [ "-H", "unix:///var/run/docker.sock" ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    depends_on:
      - ts-infra
    restart: unless-stopped

  glance:
    image: glanceapp/glance:latest
    network_mode: "service:ts-infra"
    volumes:
      # Glance v0.7+ reads config from /app/config/glance.yml by default
      # (was /app/glance.yml in v0.6 and earlier).
      - ./tailnet/glance/glance.yml:/app/config/glance.yml:ro
    environment:
      # Substituted into glance.yml at config load (Longhorn UI basic auth so
      # the monitor probe sees 200 instead of 401).
      - LONGHORN_USER=${LONGHORN_USER}
      - LONGHORN_PASS=${LONGHORN_PASS}
    depends_on:
      - ts-infra
      - traefik-lab
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    command:
      - "--cleanup"
      - "--schedule=0 0 3 * * *"
      - "--notification-url=smtp://${SMTP_USERNAME}:${SMTP_PASSWORD}@${SMTP_HOST}:${SMTP_PORT}/?from=${SMTP_FROM}&to=${ALERT_EMAIL}&starttls=yes"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.45
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    network_mode: "service:ts-infra"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"   # accept remote_write from cluster Prometheus
    volumes:
      - "./tailnet/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./tailnet/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro"
      - "prometheus_data:/prometheus"
    depends_on:
      - ts-infra
      - consul
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    network_mode: "service:ts-infra"
    command: [ "-config.file=/etc/loki/loki.yml" ]
    volumes:
      - "./tailnet/loki/loki.yml:/etc/loki/loki.yml:ro"
      - "loki_data:/loki"
    depends_on:
      - ts-infra
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    network_mode: "service:ts-infra"
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - "./tailnet/promtail/promtail.yml:/etc/promtail/promtail.yml:ro"
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /run/systemd/journal:/run/systemd/journal:ro
    depends_on:
      - ts-infra
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    network_mode: "service:ts-infra"
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.${LAB_DOMAIN}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - "./tailnet/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "grafana_data:/var/lib/grafana"
    depends_on:
      - ts-infra
      - prometheus
    restart: unless-stopped

  ts-infra-watchdog:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
    working_dir: ${PWD}
    command: >
      sh -c '
        apk add --no-cache docker-cli-compose >/dev/null;
        echo "[watchdog] ready, polling ts-infra every 10s";
        LAST="";
        while true; do
          CUR=$$(docker inspect cloudnet-ts-infra-1 --format "{{.State.StartedAt}}" 2>/dev/null || true);
          if [ -n "$$CUR" ] && [ -n "$$LAST" ] && [ "$$CUR" != "$$LAST" ]; then
            echo "[watchdog] ts-infra restarted (was $$LAST, now $$CUR), recreating sidecars";
            docker compose -p cloudnet up -d --force-recreate --no-deps \
              traefik-lab consul coredns alertmanager prometheus grafana loki promtail node-exporter portainer glance \
              && echo "[watchdog] sidecars recreated" \
              || echo "[watchdog] recreate failed";
          fi;
          LAST="$$CUR";
          sleep 10;
        done
      '
    restart: unless-stopped

volumes:
  headscale_data:
  traefik_public_acme:
  ts_infra_state:
  traefik_lab_acme:
  consul_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  portainer_data:
