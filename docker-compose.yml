services:
  traefik-public:
    image: traefik:v3.6.9
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.dns.acme.caserver=${ACME_CASERVER}"
      - "--certificatesresolvers.dns.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.dns.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.dns.acme.dnschallenge=true"
      - "--certificatesresolvers.dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.dns.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    ports:
      - "443:443/tcp"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik_public_acme:/acme"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    restart: unless-stopped

  headscale:
    image: headscale/headscale:stable
    command: [ "serve" ]
    volumes:
      - "./headscale/config.yaml:/etc/headscale/config.yaml:ro"
      - "./headscale/acl.hujson:/etc/headscale/acl.hujson:ro"
      - "headscale_data:/var/lib/headscale"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.headscale.rule=Host(`${HEADSCALE_DOMAIN}`)"
      - "traefik.http.routers.headscale.entrypoints=websecure"
      - "traefik.http.routers.headscale.tls=true"
      - "traefik.http.routers.headscale.tls.certresolver=dns"
      - "traefik.http.services.headscale.loadbalancer.server.port=8080"
    ports:
      - "3478:3478/udp"
    depends_on:
      - traefik-public
    restart: unless-stopped

  ts-infra:
    image: tailscale/tailscale:latest
    hostname: ts-infra
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ts_infra_state:/var/lib/tailscale
      - ./certs:/staging-certs:ro
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${INFRA_AUTHKEY}
      - TS_HOSTNAME=infra-vps
      - TS_ACCEPT_DNS=true
      - TS_AUTH_ONCE=true
      - TS_EXTRA_ARGS=--login-server=https://${HEADSCALE_DOMAIN} --accept-routes=true
      - SSL_CERT_DIR=${SSL_CERT_DIR}
      - TS_USERSPACE=false
      - TS_TAILSCALED_EXTRA_ARGS=--tun=tailscale0
    restart: unless-stopped

  traefik-lab:
    image: traefik:v3.6.9
    network_mode: "service:ts-infra"
    command:
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8888"
      - "--api=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--metrics.prometheus=true"
      - "--providers.consulcatalog=true"
      - "--providers.consulcatalog.endpoint.address=127.0.0.1:8500"
      - "--providers.consulcatalog.exposedbydefault=false"
      - "--providers.consulcatalog.prefix=traefik"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--certificatesresolvers.dns.acme.caserver=${ACME_CASERVER}"
      - "--certificatesresolvers.dns.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.dns.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.dns.acme.dnschallenge=true"
      - "--certificatesresolvers.dns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.dns.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    volumes:
      - "traefik_lab_acme:/acme"
      - "./tailnet/traefik/dynamic:/etc/traefik/dynamic:ro"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    depends_on:
      - ts-infra
      - consul
    restart: unless-stopped

  coredns:
    image: coredns/coredns:1.11.1
    network_mode: "service:ts-infra"
    command: [ "-conf", "/etc/coredns/Corefile" ]
    volumes:
      - "./tailnet/coredns/Corefile:/etc/coredns/Corefile:ro"
      - "./tailnet/coredns/db.lab.domain:/etc/coredns/db.lab.domain:ro"
    depends_on:
      - ts-infra
    restart: unless-stopped

  consul:
    image: hashicorp/consul:1.18
    network_mode: "service:ts-infra"
    command: [ "agent", "-server", "-bootstrap-expect=1", "-ui", "-config-dir=/consul/config" ]
    volumes:
      - "./tailnet/consul:/consul/config"
      - "consul_data:/consul/data"
    depends_on:
      - ts-infra
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    network_mode: "service:ts-infra"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    depends_on:
      - ts-infra
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    network_mode: "service:ts-infra"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://alertmanager.${LAB_DOMAIN}"
    volumes:
      - "./tailnet/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro"
      - "alertmanager_data:/alertmanager"
    depends_on:
      - ts-infra
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    network_mode: "service:ts-infra"
    command: [ "-H", "unix:///var/run/docker.sock" ]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    depends_on:
      - ts-infra
    restart: unless-stopped

  glance:
    image: glanceapp/glance:latest
    network_mode: "service:ts-infra"
    volumes:
      # Glance v0.7+ reads config from /app/config/glance.yml by default
      # (was /app/glance.yml in v0.6 and earlier).
      - ./tailnet/glance/glance.yml:/app/config/glance.yml:ro
    environment:
      # Substituted into glance.yml at config load (Longhorn UI basic auth so
      # the monitor probe sees 200 instead of 401).
      - LONGHORN_USER=${LONGHORN_USER}
      - LONGHORN_PASS=${LONGHORN_PASS}
    depends_on:
      - ts-infra
      - traefik-lab
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    command:
      - "--cleanup"
      - "--schedule=0 0 3 * * *"
      - "--notification-url=smtp://${SMTP_USERNAME}:${SMTP_PASSWORD}@${SMTP_HOST}:${SMTP_PORT}/?from=${SMTP_FROM}&to=${ALERT_EMAIL}&starttls=yes"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_API_VERSION=1.45
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    network_mode: "service:ts-infra"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"   # accept remote_write from cluster Prometheus
    volumes:
      - "./tailnet/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./tailnet/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro"
      - "prometheus_data:/prometheus"
    depends_on:
      - ts-infra
      - consul
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    network_mode: "service:ts-infra"
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    volumes:
      - "./tailnet/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro"
    depends_on:
      - ts-infra
    restart: unless-stopped

  # SNMP-via-tailnet for raidnas (Synology DS418). Shares the ts-infra
  # netns so the subnet route to 10.120.26.0/24 (advertised by
  # cn-infra's infra-exit, approved in Headscale) is in scope.
  # Prometheus scrapes this at 127.0.0.1:9116 via the relabel pattern
  # already used for blackbox-exporter — see tailnet/prometheus/prometheus.yml.
  snmp-exporter:
    image: prom/snmp-exporter:v0.27.0
    network_mode: "service:ts-infra"
    command:
      - "--config.file=/etc/snmp_exporter/snmp.yml"
    volumes:
      # snmp.yml is rendered from snmp.yml.tmpl by setup.sh (envsubst
      # bakes in SNMP_RAIDNAS_COMMUNITY; snmp_exporter doesn't honor
      # ${VAR} interpolation in its config).
      - "./tailnet/snmp-exporter/snmp.yml:/etc/snmp_exporter/snmp.yml:ro"
    depends_on:
      - ts-infra
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    network_mode: "service:ts-infra"
    command: [ "-config.file=/etc/loki/loki.yml" ]
    volumes:
      - "./tailnet/loki/loki.yml:/etc/loki/loki.yml:ro"
      - "loki_data:/loki"
    depends_on:
      - ts-infra
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    network_mode: "service:ts-infra"
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - "./tailnet/promtail/promtail.yml:/etc/promtail/promtail.yml:ro"
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /run/systemd/journal:/run/systemd/journal:ro
    depends_on:
      - ts-infra
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    network_mode: "service:ts-infra"
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.${LAB_DOMAIN}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # ── OIDC against Authentik on auth.lab.gn.al (Slice E) ──────────────
      # VPS grafana is in service:ts-infra netns, so it resolves the tailnet
      # MagicDNS name auth.lab.gn.al and the LE wildcard cert is in the
      # container's default CA bundle — no TLS_CLIENT_CA mount needed.
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authentik
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${AUTHENTIK_GRAFANA_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${AUTHENTIK_GRAFANA_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email groups
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=true
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.lab.gn.al/application/o/authorize/
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.lab.gn.al/application/o/token/
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.lab.gn.al/application/o/userinfo/
      - GF_AUTH_GENERIC_OAUTH_SIGNOUT_REDIRECT_URL=https://auth.lab.gn.al/application/o/grafana/end-session/
      - GF_AUTH_GENERIC_OAUTH_ALLOWED_GROUPS=observability
      - GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH=groups
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'observability') && 'Admin' || 'Viewer'
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT=false
    volumes:
      - "./tailnet/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "grafana_data:/var/lib/grafana"
    depends_on:
      - ts-infra
      - prometheus
    restart: unless-stopped

  # ts-infra restarts (watchtower image bump, crash, …) leave dependents
  # attached to the orphaned old netns. Two failure modes the watchdog
  # handles:
  #   1) netns drift -- dependent's HostConfig.NetworkMode "container:<id>"
  #      no longer points at the live ts-infra Id -> force-recreate.
  #   2) created-but-not-running -- compose-up name-conflict races during
  #      force-recreate can leave a dependent Status=created (never
  #      started); restart:unless-stopped does not activate -> compose
  #      start. Hit in production 2026-05-29 03:00 UTC: consul name
  #      conflict aborted the up midway, node-exporter got stranded for
  #      19h, PrometheusTargetDown alert fired.
  # Both modes are idempotent and silent in steady state. Allowlist
  # mirrors every `network_mode: service:ts-infra` dependent.
  ts-infra-watchdog:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
    working_dir: ${PWD}
    command: >
      sh -c '
        apk add --no-cache docker-cli-compose >/dev/null;
        DEPS="traefik-lab consul coredns alertmanager prometheus grafana loki promtail node-exporter portainer glance blackbox-exporter snmp-exporter";
        ACTION_THRESHOLD=3;
        ACTION_COUNT=0;
        echo "[watchdog] ready, polling dependents every 10s ($$DEPS), drift threshold $$ACTION_THRESHOLD polls";
        while true; do
          TS_ID=$$(docker inspect cloudnet-ts-infra-1 --format "{{.Id}}" 2>/dev/null || true);
          if [ -n "$$TS_ID" ]; then
            NEED_RECREATE="";
            NEED_START="";
            for dep in $$DEPS; do
              INFO=$$(docker inspect cloudnet-$$dep-1 --format "{{.HostConfig.NetworkMode}} {{.State.Status}}" 2>/dev/null || true);
              [ -n "$$INFO" ] || continue;
              DEP_NM=$$(echo "$$INFO" | awk "{print \$$1}");
              DEP_STATUS=$$(echo "$$INFO" | awk "{print \$$2}");
              DEP_TARGET=$${DEP_NM#container:};
              if [ "$$DEP_TARGET" != "$$TS_ID" ]; then
                NEED_RECREATE="$$NEED_RECREATE $$dep";
              elif [ "$$DEP_STATUS" != "running" ]; then
                NEED_START="$$NEED_START $$dep";
              fi;
            done;
            if [ -n "$$NEED_RECREATE" ] || [ -n "$$NEED_START" ]; then
              ACTION_COUNT=$$((ACTION_COUNT + 1));
              if [ "$$ACTION_COUNT" -ge "$$ACTION_THRESHOLD" ]; then
                if [ -n "$$NEED_RECREATE" ]; then
                  echo "[watchdog] persistent drift on:$$NEED_RECREATE -- recreating";
                  docker compose -p cloudnet up -d --force-recreate --no-deps $$NEED_RECREATE \
                    && echo "[watchdog] recreate OK" || echo "[watchdog] recreate FAILED";
                fi;
                if [ -n "$$NEED_START" ]; then
                  echo "[watchdog] persistent stopped on:$$NEED_START -- starting";
                  docker compose -p cloudnet start $$NEED_START \
                    && echo "[watchdog] start OK" || echo "[watchdog] start FAILED";
                fi;
                ACTION_COUNT=0;
              else
                echo "[watchdog] action pending (drift:$$NEED_RECREATE start:$$NEED_START count=$$ACTION_COUNT/$$ACTION_THRESHOLD)";
              fi;
            else
              ACTION_COUNT=0;
            fi;
          fi;
          sleep 10;
        done
      '
    restart: unless-stopped

volumes:
  headscale_data:
  traefik_public_acme:
  ts_infra_state:
  traefik_lab_acme:
  consul_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  portainer_data:
