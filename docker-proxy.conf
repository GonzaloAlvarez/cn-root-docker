events {
  worker_connections 1024;
}

http {
  upstream docker {
    server unix:/var/run/docker.sock;
  }

  server {
    listen 2375;

    # Rewrite any /vX.Y/... request to a version Docker Engine 26+ accepts
    location ~ ^/v[0-9.]+/(.*)$ {
      rewrite ^/v[0-9.]+/(.*)$ /v1.45/$1 break;
      proxy_pass         http://docker;
      proxy_http_version 1.1;
      proxy_set_header   Host "";
      proxy_set_header   Connection "";
      proxy_read_timeout 3600s;
      proxy_buffering    off;
    }

    # Unversioned paths (e.g. /_ping) pass through unchanged
    location / {
      proxy_pass         http://docker;
      proxy_http_version 1.1;
      proxy_set_header   Host "";
      proxy_set_header   Connection "";
    }
  }
}
