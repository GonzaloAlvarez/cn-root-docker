groups:
  - name: services
    rules:
      - alert: ConsulServiceCritical
        expr: consul_health_service_status{status="critical"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Consul service {{ $labels.service_name }} is critical"
          description: "Service {{ $labels.service_name }} has been in a critical state for more than 2 minutes."

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Scrape target {{ $labels.instance }} (job: {{ $labels.job }}) has been unreachable for more than 2 minutes."

  - name: resources
    rules:
      - alert: HighCPU
        expr: (1 - avg by (instance)(rate(node_cpu_seconds_total{instance="127.0.0.1:9100",mode="idle"}[5m]))) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VPS CPU usage is high"
          description: "CPU usage has been above 90% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

      - alert: HighMemory
        expr: (1 - node_memory_MemAvailable_bytes{instance="127.0.0.1:9100"} / node_memory_MemTotal_bytes{instance="127.0.0.1:9100"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VPS memory usage is high"
          description: "Memory usage has been above 85% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

      - alert: DiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{instance="127.0.0.1:9100",mountpoint="/"} / node_filesystem_size_bytes{instance="127.0.0.1:9100",mountpoint="/"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "VPS disk space is running low"
          description: "Disk usage on / has been above 80% for more than 5 minutes (current: {{ $value | printf \"%.1f\" }}%)."

  - name: homeiot
    rules:
      - alert: HomeIoTDiskSpaceLow
        expr: (1 - node_filesystem_avail_bytes{instance="ha.ts.gn.al:9100",mountpoint="/"} / node_filesystem_size_bytes{instance="ha.ts.gn.al:9100",mountpoint="/"}) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "homeiot disk usage high"
          description: "/ on homeiot is {{ $value | printf \"%.1f\" }}% full."

      - alert: HomeIoTDiskSpaceCritical
        expr: (1 - node_filesystem_avail_bytes{instance="ha.ts.gn.al:9100",mountpoint="/"} / node_filesystem_size_bytes{instance="ha.ts.gn.al:9100",mountpoint="/"}) * 100 > 95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "homeiot disk almost full"
          description: "/ on homeiot is {{ $value | printf \"%.1f\" }}% full — services may fail."

      - alert: HomeIoTHighCPU
        expr: (1 - avg by (instance)(rate(node_cpu_seconds_total{instance="ha.ts.gn.al:9100",mode="idle"}[5m]))) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "homeiot CPU high"
          description: "homeiot CPU above 90% for 10m (current: {{ $value | printf \"%.1f\" }}%)."

      - alert: HomeIoTHighMemory
        expr: (1 - node_memory_MemAvailable_bytes{instance="ha.ts.gn.al:9100"} / node_memory_MemTotal_bytes{instance="ha.ts.gn.al:9100"}) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "homeiot memory high"
          description: "homeiot memory above 85% for 10m (current: {{ $value | printf \"%.1f\" }}%)."

  # raidnas (Synology DS418) — SNMP-derived storage health. Metric names
  # below assume the thin synology module in tailnet/snmp-exporter/snmp.yml
  # (raw enterprise OIDs walked). If snmp.yml is later upgraded to the
  # full prometheus/snmp_exporter generated module, the metric names will
  # change (e.g. `synology_disk_status` instead of `enterprises_6574_*`)
  # and the expressions below must be re-pointed. Confirm names via:
  #   docker exec cloudnet-snmp-exporter-1 wget -qO- \
  #     "http://127.0.0.1:9116/snmp?module=synology&target=10.120.26.20" | head -50
  - name: raidnas
    rules:
      - alert: RaidnasUnreachable
        expr: up{job="raidnas-snmp"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "raidnas SNMP unreachable"
          description: "snmp-exporter scrape of raidnas (10.120.26.20:161) has failed for more than 3 minutes. Check DSM SNMP Service is enabled and the cn-infra subnet route is up."

      - alert: RaidnasScrapeDurationHigh
        expr: scrape_duration_seconds{job="raidnas-snmp"} > 8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "raidnas SNMP scrape is slow"
          description: "snmp-exporter scrape of raidnas is taking >{{ $value | printf \"%.1f\" }}s — likely subnet-route slowness or NAS overload."

  - name: k8s-ingress
    rules:
      # blackbox-k8s-http probes the 5 k8s tailnet ingresses (netbox,
      # freshrss, filemanager, cluster, longhorn). Probe returns 0
      # when the response code falls outside http_2xx_3xx_4xx — i.e.
      # 5xx from the ingress, which is exactly what happens when a
      # backend pod is in CrashLoopBackOff. This rule would have
      # caught the FreshRSS init-container loop within 5 minutes
      # instead of 28h. Generic — covers any future ingress added to
      # the blackbox-k8s-http static_configs.
      - alert: K8sIngressProbeFailed
        expr: probe_success{job="blackbox-k8s-http"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} ingress probe failing"
          description: "blackbox-k8s-http returned non-2xx/3xx/4xx for >5m on {{ $labels.instance }} — backend pod likely down or unhealthy. Check `kubectl get pods -A | grep -v Running` from a working KUBECONFIG."

      - alert: K8sIngressSlow
        expr: probe_duration_seconds{job="blackbox-k8s-http"} > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} ingress probe is slow"
          description: "blackbox-k8s-http probe of {{ $labels.instance }} taking >{{ $value | printf \"%.1f\" }}s — likely Longhorn IO contention, MetalLB path issue, or backend overload."

  - name: cn-fitness
    rules:
      # blackbox-tailnet-http probes kaiser-hosted tailnet ingresses
      # (currently just fitness.lab.gn.al; expand the static_configs in
      # prometheus.yml to cover more). Parallel structure to K8sIngressProbeFailed.
      - alert: TailnetIngressProbeFailed
        expr: probe_success{job="blackbox-tailnet-http"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} ingress probe failing"
          description: "blackbox-tailnet-http returned non-2xx/3xx/4xx for >5m on {{ $labels.instance }} — kaiser-hosted backend likely down. Check `ssh kaiser.lan 'docker compose -p cn-fitness ps'` and `docker compose -p cn-fitness logs --tail=100`."

      - alert: TailnetIngressSlow
        expr: probe_duration_seconds{job="blackbox-tailnet-http"} > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} ingress probe is slow"
          description: "blackbox-tailnet-http probe of {{ $labels.instance }} taking >{{ $value | printf \"%.1f\" }}s — possible Postgres lock contention, backend overload, or tailnet path issue."

      - alert: FitnessPostgresDown
        expr: up{job="fitness-postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "SparkyFitness Postgres scrape failing"
          description: "postgres-exporter at fitness.ts.gn.al:9187 unreachable for >2m — DB container likely down. Check `ssh kaiser.lan 'docker logs cn-fitness-sparkyfitness-db-1 --tail=50'`."

      - alert: FitnessNodeDown
        expr: up{job="fitness-node"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SparkyFitness node-exporter scrape failing"
          description: "fitness.ts.gn.al:9100 unreachable for >5m — likely ts-fitness sidecar netns drift; ts-fitness-watchdog should self-heal within 10s. If persistent, manual `docker compose -p cn-fitness up -d --force-recreate --no-deps node-exporter` from /home/gonzalo/cn-fitness on kaiser."
