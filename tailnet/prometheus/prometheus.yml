global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: coredns
    static_configs:
      - targets: ["127.0.0.1:9153"]

  - job_name: traefik
    static_configs:
      - targets: ["127.0.0.1:8888"]

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["127.0.0.1:8500"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["127.0.0.1:3000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: alertmanager
    static_configs:
      - targets: ["127.0.0.1:9093"]

  - job_name: homeiot-node
    static_configs:
      - targets: ["ha.ts.gn.al:9100"]
        labels:
          host: homeiot

  # ts-infra's tailscaled overwrites /etc/resolv.conf with MagicDNS, so
  # docker-bridge service names don't resolve from prometheus's namespace
  # (it inherits ts-infra's). extra_hosts can't be used on a container with
  # network_mode: service:X. Targeting headscale's bridge IP directly.
  - job_name: headscale
    static_configs:
      - targets: ["172.18.0.5:9090"]

  - job_name: loki
    static_configs:
      - targets: ["127.0.0.1:3100"]

  - job_name: vaultwarden-node
    static_configs:
      - targets: ["vault.ts.gn.al:9100"]
        labels:
          host: vaultwarden

  - job_name: jellyfin-node
    static_configs:
      - targets: ["jellyfin.ts.gn.al:9100"]
        labels:
          host: jellyfin
          stack: cn-media

  # Blackbox HTTP probes for every k8s tailnet ingress. Probes from the
  # ts-infra netns so traefik-lab → consul → k8s-router → MetalLB pool reflects
  # the same path a real user takes from the tailnet.
  - job_name: blackbox-k8s-http
    metrics_path: /probe
    params:
      module: [http_2xx_3xx_4xx]
    static_configs:
      - targets:
          - https://netbox.lab.gn.al/login/
          - https://freshrss.lab.gn.al/
          - https://filemanager.lab.gn.al/
          - https://cluster.lab.gn.al/
          - https://longhorn.lab.gn.al/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  # raidnas (Synology DS418) — SNMP scrape via subnet route. snmp-exporter
  # shares ts-infra's netns (same indirection pattern as blackbox above).
  # `auth` is a query-parameter selector for snmp_exporter ≥ 0.25 — picks
  # the `raidnas_v2` block under `auths:` in tailnet/snmp-exporter/snmp.yml.
  - job_name: raidnas-snmp
    metrics_path: /snmp
    params:
      module: [synology]
      auth: [raidnas_v2]
    static_configs:
      - targets: ["10.120.26.20"]
        labels:
          host: raidnas
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9116
