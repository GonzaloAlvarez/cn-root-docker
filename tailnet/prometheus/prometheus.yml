global:
  scrape_interval: 15s

scrape_configs:
  - job_name: coredns
    static_configs:
      - targets: ["127.0.0.1:9153"]

  - job_name: traefik
    static_configs:
      - targets: ["127.0.0.1:8080"]

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["127.0.0.1:8500"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["127.0.0.1:3000"]
