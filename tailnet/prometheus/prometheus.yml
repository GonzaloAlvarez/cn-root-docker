global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: coredns
    static_configs:
      - targets: ["127.0.0.1:9153"]

  - job_name: traefik
    static_configs:
      - targets: ["127.0.0.1:8888"]

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["127.0.0.1:8500"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["127.0.0.1:3000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: alertmanager
    static_configs:
      - targets: ["127.0.0.1:9093"]

  - job_name: homeiot-node
    static_configs:
      - targets: ["ha.ts.gn.al:9100"]
        labels:
          host: homeiot

  # ts-infra's tailscaled overwrites /etc/resolv.conf with MagicDNS, so
  # docker-bridge service names don't resolve from prometheus's namespace
  # (it inherits ts-infra's). extra_hosts can't be used on a container with
  # network_mode: service:X. Targeting headscale's bridge IP directly.
  - job_name: headscale
    static_configs:
      - targets: ["172.18.0.5:9090"]

  - job_name: loki
    static_configs:
      - targets: ["127.0.0.1:3100"]

  - job_name: vaultwarden-node
    static_configs:
      - targets: ["vault.ts.gn.al:9100"]
        labels:
          host: vaultwarden

  - job_name: jellyfin-node
    static_configs:
      - targets: ["jellyfin.ts.gn.al:9100"]
        labels:
          host: jellyfin
          stack: cn-media

  # cn-media — jellyfin built-in Prometheus endpoint (gated by
  # <EnableMetrics> in system.xml, served unauth on the main port).
  - job_name: jellyfin
    metrics_path: /metrics
    static_configs:
      - targets: ["jellyfin.ts.gn.al:8096"]
        labels:
          host: jellyfin
          stack: cn-media
          app: jellyfin

  # cn-bittorrent — host-level metrics (ts-torrent netns).
  - job_name: bittorrent-node
    static_configs:
      - targets: ["torrent.ts.gn.al:9100"]
        labels:
          host: torrent
          stack: cn-bittorrent

  # cn-bittorrent — app-level via exportarr. The *arr suite was split out
  # to its own Tailscale sidecar (ts-arr / arr.ts.gn.al, tag:svc) so it
  # egresses via kaiser's WAN instead of Mullvad (indexer endpoints
  # IP-block Mullvad). Each exporter shares ts-arr's netns on its own
  # port: 9707 sonarr | 9708 radarr | 9709 prowlarr | 9710 lidarr |
  # 9711 readarr. qbittorrent-exporter stays on torrent.ts.gn.al:9712
  # (Mullvad netns) — see the qbittorrent block below.
  - job_name: sonarr
    static_configs:
      - targets: ["arr.ts.gn.al:9707"]
        labels:
          stack: cn-bittorrent
          app: sonarr
  - job_name: radarr
    static_configs:
      - targets: ["arr.ts.gn.al:9708"]
        labels:
          stack: cn-bittorrent
          app: radarr
  - job_name: prowlarr
    static_configs:
      - targets: ["arr.ts.gn.al:9709"]
        labels:
          stack: cn-bittorrent
          app: prowlarr
  - job_name: lidarr
    static_configs:
      - targets: ["arr.ts.gn.al:9710"]
        labels:
          stack: cn-bittorrent
          app: lidarr
  - job_name: readarr
    static_configs:
      - targets: ["arr.ts.gn.al:9711"]
        labels:
          stack: cn-bittorrent
          app: readarr

  - job_name: qbittorrent
    static_configs:
      - targets: ["torrent.ts.gn.al:9712"]
        labels:
          stack: cn-bittorrent
          app: qbittorrent

  # cn-roms — host-level metrics (ts-roms netns). RomM itself has no
  # /metrics endpoint upstream (no prometheus_client import in
  # backend/main.py), so this is node-exporter only for v1. Future:
  # blackbox probe of /api/heartbeat or community exporter.
  - job_name: roms-node
    static_configs:
      - targets: ["roms.ts.gn.al:9100"]
        labels:
          host: roms
          stack: cn-roms

  # cn-fitness (SparkyFitness on kaiser) — host-level metrics from the
  # node-exporter in ts-fitness netns. Backend (Node.js + better-auth)
  # has no /metrics endpoint upstream, so app-level signal comes from
  # blackbox + postgres-exporter (next job).
  - job_name: fitness-node
    static_configs:
      - targets: ["fitness.ts.gn.al:9100"]
        labels:
          host: fitness
          stack: cn-fitness
          app: node-exporter

  # cn-fitness — Postgres metrics. postgres-exporter shares ts-fitness's
  # netns and dials the DB via the pinned bridge IP (172.30.1.10). DSN
  # uses the superuser, not the limited app role, so pg_stat_* views
  # resolve.
  - job_name: fitness-postgres
    static_configs:
      - targets: ["fitness.ts.gn.al:9187"]
        labels:
          stack: cn-fitness
          app: postgres-exporter

  # cn-librechat (LibreChat on kaiser) — host-level metrics from the
  # node-exporter in ts-librechat netns. The api has no upstream /metrics
  # endpoint, so app-level signal comes from blackbox + mongodb-exporter.
  - job_name: librechat-node
    static_configs:
      - targets: ["chat.ts.gn.al:9100"]
        labels:
          host: librechat
          stack: cn-librechat
          app: node-exporter

  # cn-librechat — MongoDB metrics. mongodb-exporter shares ts-librechat's
  # netns and dials Mongo via the pinned bridge IP (172.30.2.10:27017).
  - job_name: librechat-mongodb
    static_configs:
      - targets: ["chat.ts.gn.al:9216"]
        labels:
          stack: cn-librechat
          app: mongodb-exporter

  # Blackbox HTTP probes for kaiser-hosted tailnet ingresses. Separate
  # job from blackbox-k8s-http because the k8s-services Grafana dashboard
  # hardcodes job="blackbox-k8s-http" in 5 panel queries — renaming would
  # break it. Two parallel jobs is the smaller blast radius.
  - job_name: blackbox-tailnet-http
    metrics_path: /probe
    params:
      module: [http_2xx_3xx_4xx]
    static_configs:
      - targets:
          - https://fitness.lab.gn.al/
          - https://chat.lab.gn.al/
          - https://accounts.fxa.lab.gn.al/.well-known/fxa-client-configuration
          - https://api.fxa.lab.gn.al/__heartbeat__
          - https://oauth.fxa.lab.gn.al/__heartbeat__
          - https://profile.fxa.lab.gn.al/__heartbeat__
          # legacy mozilla/syncserver has no /__heartbeat__ (fxa-mono-only endpoint);
          # the tokenserver returns 401 unauthenticated (in valid_status_codes) — proves it's serving.
          - https://sync.lab.gn.al/token/1.0/sync/1.5
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  # Blackbox HTTP probes for every k8s tailnet ingress. Probes from the
  # ts-infra netns so traefik-lab → consul → k8s-router → MetalLB pool reflects
  # the same path a real user takes from the tailnet.
  - job_name: blackbox-k8s-http
    metrics_path: /probe
    params:
      module: [http_2xx_3xx_4xx]
    static_configs:
      - targets:
          - https://netbox.lab.gn.al/login/
          - https://freshrss.lab.gn.al/
          - https://filemanager.lab.gn.al/
          - https://cluster.lab.gn.al/
          - https://longhorn.lab.gn.al/
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9115

  # raidnas (Synology DS418) — SNMP scrape via subnet route. snmp-exporter
  # shares ts-infra's netns (same indirection pattern as blackbox above).
  # `auth` is a query-parameter selector for snmp_exporter ≥ 0.25 — picks
  # the `raidnas_v2` block under `auths:` in tailnet/snmp-exporter/snmp.yml.
  - job_name: raidnas-snmp
    metrics_path: /snmp
    params:
      module: [synology]
      auth: [raidnas_v2]
    static_configs:
      - targets: ["10.120.26.20"]
        labels:
          host: raidnas
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 127.0.0.1:9116
