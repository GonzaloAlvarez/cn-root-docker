global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: coredns
    static_configs:
      - targets: ["127.0.0.1:9153"]

  - job_name: traefik
    static_configs:
      - targets: ["127.0.0.1:8888"]

  - job_name: consul
    metrics_path: /v1/agent/metrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["127.0.0.1:8500"]

  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["127.0.0.1:3000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: alertmanager
    static_configs:
      - targets: ["127.0.0.1:9093"]
