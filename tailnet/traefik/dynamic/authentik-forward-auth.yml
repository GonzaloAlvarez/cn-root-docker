# cn-root-docker/tailnet/traefik/dynamic/authentik-forward-auth.yml
#
# Authentik forward-auth middleware for the tailnet side (traefik-lab).
# Routers opt in via the Consul tag
# `traefik.http.routers.<name>.middlewares=authentik-lab@file`.
#
# `address` points at the DEDICATED tailnet outpost (`outpost-lab`,
# defined in cn-root-docker/docker-compose.yml). The outpost shares
# ts-infra's network namespace with traefik-lab, so 127.0.0.1:9300 is the
# outpost container's HTTP listener — no inter-container TCP, no DNS.
#
# Why a dedicated outpost (vs. reusing the embedded outpost on neptune):
# Authentik's outpost has ONE `authentik_host_browser` field — there's
# no per-provider override. The embedded outpost on neptune is pinned to
# auth.neptune.lan for the LAN ingress (roms.kaiser.lan, which gets the
# step-ca leaf). This outpost is pinned to auth.lab.gn.al so the 302
# from a no-session forward-auth call lands on the LE-wildcard URL that
# tailnet/MagicDNS actually resolves. See setup-romm-proxy-sso.sh.

http:
  middlewares:
    authentik-lab:
      forwardAuth:
        address: http://127.0.0.1:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - Authorization
