theme:
  background-color: 240 8 9
  primary-color: 43 50 70
  contrast-multiplier: 1.1

pages:
  - name: Home
    # No `width: slim` — slim caps at 2 columns and we have 3 (small / full / small).
    hide-desktop-navigation: true
    columns:
      - size: small
        widgets:
          - type: calendar

          - type: weather
            location: New York, United States
            units: metric

      - size: full
        widgets:
          - type: search
            search-engine: duckduckgo
            new-tab: true

          - type: bookmarks
            # ────────────────────────────────────────────────────────────────
            # LLM-AGENT EDIT TARGET
            # Add a new service link by appending `- title:` / `url:` under
            # the appropriate group below. Keep alphabetical ordering within
            # each group. The `monitor` widget further down should mirror
            # the same URL set.
            # ────────────────────────────────────────────────────────────────
            groups:
              - title: Cluster
                color: 10 70 50
                links:
                  - title: Headlamp (Cluster UI)
                    url: https://cluster.lab.gn.al
                  - title: Longhorn
                    url: https://longhorn.lab.gn.al

              - title: Apps
                color: 200 70 50
                links:
                  - title: Filebrowser
                    url: https://filemanager.lab.gn.al
                  - title: FreshRSS
                    url: https://freshrss.lab.gn.al
                  - title: NetBox
                    url: https://netbox.lab.gn.al
                  - title: Vaultwarden
                    url: https://passwords.lab.gn.al

              - title: Torrent
                color: 340 70 50
                links:
                  - title: Lidarr
                    url: https://lidarr.lab.gn.al
                  - title: Prowlarr
                    url: https://prowlarr.lab.gn.al
                  - title: qBittorrent
                    url: https://torrent.lab.gn.al
                  - title: Radarr
                    url: https://radarr.lab.gn.al
                  - title: Readarr
                    url: https://readarr.lab.gn.al
                  - title: Sonarr
                    url: https://sonarr.lab.gn.al

              - title: Infra
                color: 280 70 50
                links:
                  - title: Alertmanager
                    url: https://alertmanager.lab.gn.al
                  - title: Consul
                    url: https://consul.lab.gn.al/ui/
                  - title: Grafana
                    url: https://grafana.lab.gn.al
                  - title: Portainer
                    url: https://portainer.lab.gn.al
                  - title: Prometheus
                    url: https://prometheus.lab.gn.al
                  - title: Traefik
                    url: https://traefik.lab.gn.al/dashboard/

          - type: group
            widgets:
              - type: rss
                title: Hacker News
                limit: 10
                collapse-after: 5
                feeds:
                  - url: https://news.ycombinator.com/rss
              - type: rss
                title: Lobsters
                limit: 10
                collapse-after: 5
                feeds:
                  - url: https://lobste.rs/rss

          - type: monitor
            title: Status
            cache: 1m
            sites:
              - title: NetBox
                url: https://netbox.lab.gn.al
              - title: Vaultwarden
                url: https://passwords.lab.gn.al
              - title: Filebrowser
                url: https://filemanager.lab.gn.al
              - title: FreshRSS
                url: https://freshrss.lab.gn.al
              - title: Headlamp
                url: https://cluster.lab.gn.al
              - title: Longhorn
                url: https://longhorn.lab.gn.al
                # Pass basic auth so the probe gets 200 instead of 401.
                # Creds come from the glance container env vars
                # LONGHORN_USER / LONGHORN_PASS (set in /opt/cloudnet/.env on
                # the VPS — see .env.example for the placeholder).
                check-url: https://${LONGHORN_USER}:${LONGHORN_PASS}@longhorn.lab.gn.al/
              - title: Grafana
                url: https://grafana.lab.gn.al
              - title: Prometheus
                url: https://prometheus.lab.gn.al
              - title: qBittorrent
                url: https://torrent.lab.gn.al
              - title: Sonarr
                url: https://sonarr.lab.gn.al
              - title: Radarr
                url: https://radarr.lab.gn.al
              - title: Prowlarr
                url: https://prowlarr.lab.gn.al
              - title: Lidarr
                url: https://lidarr.lab.gn.al
              - title: Readarr
                url: https://readarr.lab.gn.al

          - type: videos
            channels:
              - UCNUzWfHUP_iXZ1GMHz8gBgw  # @ryukahr
              - UCy0tKL1T7wFoYcxCe0xjN6Q  # @TechnologyConnections
              - UCBJycsmduvYEL83R_U4JriQ  # @mkbhd (Marques Brownlee)
              - UCAL3JXZSzSm8AlZyD3nQdBA  # @primitivetechnology9550
              - UCsBjURrPoezykLs9EqgamOA  # @Fireship
              - UC_0CVCfC_3iuHqmyClu59Uw  # @ETAPRIME

      - size: small
        widgets:
          - type: markets
            markets:
              - symbol: SPY
                name: S&P 500
              - symbol: AXON
                name: Axon
              - symbol: COF
                name: Capital One
              - symbol: AAPL
                name: Apple
              - symbol: AMZN
                name: Amazon
              - symbol: META
                name: Meta
              - symbol: GOOGL
                name: Google
