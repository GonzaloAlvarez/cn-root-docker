apiVersion: 1

# Kaiser (cn-observability) data sources, for the Resilience dashboard which
# lives in both Grafanas. The LAN fleet's resilience metrics + logs land in
# kaiser's Prometheus/Loki. Reached from the VPS via the infra-exit subnet
# route to kaiser's cn-home traefik (10.1.1.140:443), selecting the backend
# with a Host header — same shape as k8s-cluster.yml, but HTTPS + tlsSkipVerify
# because kaiser's ingress uses a step-ca cert (untrusted by this Grafana, and
# we connect by IP so SNI won't match).

datasources:
  - name: Kaiser Prometheus
    uid: kaiser-prometheus
    type: prometheus
    access: proxy
    url: https://10.1.1.140
    editable: false
    jsonData:
      tlsSkipVerify: true
      httpHeaderName1: Host
    secureJsonData:
      httpHeaderValue1: prometheus.kaiser.lan

  - name: Kaiser Loki
    uid: kaiser-loki
    type: loki
    access: proxy
    url: https://10.1.1.140
    editable: false
    jsonData:
      tlsSkipVerify: true
      httpHeaderName1: Host
    secureJsonData:
      httpHeaderValue1: loki.kaiser.lan
