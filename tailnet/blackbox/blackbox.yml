modules:
  # Probe an HTTPS endpoint, accept any "service is alive" response.
  # 401/403 still mean the service is responding (auth-gated), so count them up.
  # 5xx and connection failures count down.
  http_2xx_3xx_4xx:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      valid_http_versions: [HTTP/1.1, HTTP/2.0]
      valid_status_codes: [200, 201, 204, 301, 302, 303, 307, 308, 401, 403]
      method: GET
      follow_redirects: false
      fail_if_ssl: false
      fail_if_not_ssl: true
      tls_config:
        insecure_skip_verify: false
